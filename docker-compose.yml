version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: ai_coach_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ai_coach_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: ai_coach_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://root:root@mysql:3306/ai_coach_db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - mysql
    volumes:
      - ./backend:/app

volumes:
  mysql_data: